<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Clawkie-Talkie — Hi-Fi Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #0a0a0b; min-height: 100vh; }
  * { box-sizing: border-box; }
  body {
    font-family: 'IBM Plex Sans', -apple-system, system-ui, sans-serif;
    color: #fafafa;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  /* custom scrollbar — thin, unobtrusive, matches the OLED aesthetic */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
  * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }
  @keyframes pulseDot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.45; transform: scale(1.3); }
  }
  @keyframes caret {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  @keyframes auraBreathe {
    0%, 100% { transform: scale(1); opacity: 0.55; }
    50% { transform: scale(1.08); opacity: 0.75; }
  }
  @keyframes auraPulse {
    0% { transform: scale(0.92); opacity: 0.5; }
    100% { transform: scale(1.22); opacity: 0; }
  }
  @keyframes rippleOut {
    0% { transform: scale(0.8); opacity: 0.9; }
    100% { transform: scale(1.15); opacity: 0; }
  }
  button { font-family: inherit; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="hifi-tokens.js"></script>
<script type="text/babel" src="hifi-script.jsx"></script>
<script type="text/babel" src="hifi-phone.jsx"></script>
<script type="text/babel" src="hifi-driving.jsx"></script>
<script type="text/babel" src="hifi-errors.jsx"></script>
<script type="text/babel" src="hifi-screens.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "amber",
  "font": "mono",
  "screen": "error",
  "errorKind": "bad_session"
}/*EDITMODE-END*/;

function App() {
  const [accent, setAccent] = React.useState(TWEAKS.accent || 'amber');
  const [fontMode, setFontMode] = React.useState(TWEAKS.font || 'mono');
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [forcedState, setForcedState] = React.useState(null);
  const [currentState, setCurrentState] = React.useState('idle');
  const [screen, setScreen] = React.useState(TWEAKS.screen || 'handoff'); // handoff | driving | history | transcript | settings | error
  const [errorKind, setErrorKind] = React.useState(TWEAKS.errorKind || 'mic_denied');
  const [openSession, setOpenSession] = React.useState('agent:main:discord:channel:1495266157463208138');
  const [settings, setSettings] = React.useState({
    voice: 'Samantha (en-US)',
    speed: 1.05,
    format: 'md',
    timestamps: false,
    provider: 'xai',
    apiKeys: {
      xai: 'xai-V8nKqP7rX2mY4hB6wL9tD3sF5jA1cN0vZ',
      openai: '',
    },
    apiKeyStatuses: {
      xai: 'ok',
      openai: 'unset',
    },
  });
  const screenRef = React.useRef(null);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // pre-warm speech synth voices
  React.useEffect(() => {
    try { window.speechSynthesis.getVoices(); } catch(e){}
  }, []);

  const persist = (k, v) => window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  const accentCfg = HIFI.accents[accent];

  return (
    <div style={{ display: 'flex', gap: 32, alignItems: 'flex-start' }}>
      {/* Left side: context label */}
      <div style={{ width: 220, paddingTop: 40 }}>
        <div style={{
          fontFamily: HIFI.fonts.mono, fontSize: 11, letterSpacing: 2,
          color: HIFI.ink3, fontWeight: 700, marginBottom: 6,
        }}>HI-FI PROTOTYPE</div>
        <div style={{
          fontFamily: HIFI.fonts.mono, fontSize: 24, fontWeight: 600,
          color: HIFI.ink, lineHeight: 1.2, marginBottom: 14,
        }}>Clawkie<span style={{ color: accentCfg.rec }}>-Talkie</span></div>
        <div style={{
          fontFamily: HIFI.fonts.sans, fontSize: 13, color: HIFI.ink2,
          lineHeight: 1.55,
        }}>
          A walky-talky for your brain. Tap to record, tap again to stop.
          AI replies out loud. Everything kept as text.
        </div>
        <div style={{
          marginTop: 24, padding: '14px 16px', borderRadius: 12,
          border: `1px solid ${HIFI.stroke}`, background: HIFI.surface,
          fontFamily: HIFI.fonts.mono, fontSize: 11, lineHeight: 1.6,
          color: HIFI.ink2,
        }}>
          <div style={{ color: HIFI.ink, fontWeight: 700, letterSpacing: 1.4, marginBottom: 8, fontSize: 10 }}>
            TRY IT →
          </div>
          1. Tap <span style={{ color: accentCfg.rec }}>●</span> to start<br/>
          2. Tap <span style={{ color: accentCfg.rec }}>■</span> to stop<br/>
          3. AI thinks, then reads aloud<br/>
          4. Tap <span style={{ color: HIFI.ai }}>◉</span> to silence (reply is saved)
        </div>
        <div style={{
          marginTop: 16, fontFamily: HIFI.fonts.mono, fontSize: 10,
          letterSpacing: 1.2, color: HIFI.ink4,
        }}>
          STATE: <span style={{ color: HIFI.ink2 }}>{currentState.toUpperCase()}</span>
        </div>

        {/* Screen nav */}
        <div style={{
          marginTop: 26, paddingTop: 16, borderTop: `1px solid ${HIFI.stroke}`,
        }}>
          <div style={{
            fontFamily: HIFI.fonts.mono, fontSize: 10, letterSpacing: 1.6,
            color: HIFI.ink3, fontWeight: 700, marginBottom: 10,
          }}>SCREENS</div>
          {[
            { id: 'handoff',    label: 'Handoff landing',  hint: 'from Discord link' },
            { id: 'driving',    label: 'Driving mode',     hint: 'main voice screen' },
            { id: 'history',    label: 'History',          hint: 'past sessions' },
            { id: 'transcript', label: 'Transcript',       hint: 'session detail' },
            { id: 'settings',   label: 'Settings',         hint: 'API key · voice · export' },
            { id: 'error',      label: 'Error states',     hint: '5 scenarios' },
          ].map(s => {
            const on = screen === s.id;
            return (
              <button key={s.id}
                onClick={() => { setScreen(s.id); persist('screen', s.id); }}
                style={{
                  display: 'block', width: '100%', textAlign: 'left',
                  padding: '8px 10px', marginBottom: 2, borderRadius: 8,
                  background: on ? HIFI.surface : 'transparent',
                  border: `1px solid ${on ? HIFI.strokeStrong : 'transparent'}`,
                  color: on ? HIFI.ink : HIFI.ink2, cursor: 'pointer',
                  fontFamily: 'inherit',
                }}>
                <div style={{
                  fontFamily: HIFI.fonts.sans, fontSize: 12, fontWeight: on ? 600 : 500,
                }}>{on ? '▸ ' : '  '}{s.label}</div>
                <div style={{
                  fontFamily: HIFI.fonts.mono, fontSize: 9, color: HIFI.ink4,
                  letterSpacing: 0.6, marginLeft: 14, marginTop: 1,
                }}>{s.hint}</div>
              </button>
            );
          })}
        </div>

        {/* Error-kind picker, visible when on error screen */}
        {screen === 'error' && (
          <div style={{
            marginTop: 18, paddingTop: 14, borderTop: `1px solid ${HIFI.stroke}`,
          }}>
            <div style={{
              fontFamily: HIFI.fonts.mono, fontSize: 10, letterSpacing: 1.6,
              color: HIFI.ink3, fontWeight: 700, marginBottom: 10,
            }}>ERROR KIND</div>
            {[
              { id: 'mic_denied',  label: 'Mic blocked',          hint: 'first tap, no permission' },
              { id: 'offline',     label: 'No connection',        hint: 'network drop mid-session' },
              { id: 'stt_failed',  label: 'Transcription failed', hint: 'spoke, got nothing' },
              { id: 'tts_failed',  label: 'Audio failed',         hint: 'text ok, no sound' },
              { id: 'bad_session', label: 'Bad handoff link',     hint: 'expired or invalid' },
            ].map(e => {
              const on = errorKind === e.id;
              return (
                <button key={e.id}
                  onClick={() => { setErrorKind(e.id); persist('errorKind', e.id); }}
                  style={{
                    display: 'block', width: '100%', textAlign: 'left',
                    padding: '7px 10px', marginBottom: 2, borderRadius: 8,
                    background: on ? HIFI.surface : 'transparent',
                    border: `1px solid ${on ? HIFI.strokeStrong : 'transparent'}`,
                    color: on ? HIFI.ink : HIFI.ink2, cursor: 'pointer',
                    fontFamily: 'inherit',
                  }}>
                  <div style={{
                    fontFamily: HIFI.fonts.sans, fontSize: 11, fontWeight: on ? 600 : 500,
                  }}>{on ? '▸ ' : '  '}{e.label}</div>
                  <div style={{
                    fontFamily: HIFI.fonts.mono, fontSize: 9, color: HIFI.ink4,
                    letterSpacing: 0.5, marginLeft: 14, marginTop: 1,
                  }}>{e.hint}</div>
                </button>
              );
            })}
          </div>
        )}
      </div>

      {/* Phone */}
      <HiFiPhone>
        {screen === 'handoff' && (
          <HandoffScreen
            onEnter={() => setScreen('driving')}
            onBack={() => setScreen('driving')}
          />
        )}
        {screen === 'driving' && (
          <DrivingScreen
            accent={accent}
            fontMode={fontMode}
            onStateChange={setCurrentState}
            onReplay={() => { setOpenSession('agent:main:discord:channel:1495266157463208138'); setScreen('transcript'); }}
            onHistory={() => setScreen('history')}
          />
        )}
        {screen === 'history' && (
          <HistoryScreen
            onBack={() => setScreen('driving')}
            onOpen={(id) => { setOpenSession(id); setScreen('transcript'); }}
          />
        )}
        {screen === 'transcript' && (
          <TranscriptScreen
            sessionId={openSession}
            onBack={() => setScreen('history')}
          />
        )}
        {screen === 'settings' && (
          <SettingsScreen
            onBack={() => setScreen('driving')}
            settings={settings}
            setSettings={setSettings}
          />
        )}
        {screen === 'error' && (
          <ErrorScreen
            kind={errorKind}
            accent={accent}
            onDismiss={() => setScreen('driving')}
            onRetry={() => setScreen('driving')}
            onBack={() => setScreen('driving')}
          />
        )}
      </HiFiPhone>

      {/* TWEAKS */}
      {tweaksOpen && (
        <div style={{
          position: 'fixed', bottom: 20, right: 20, width: 280,
          background: HIFI.surface, border: `1px solid ${HIFI.strokeStrong}`,
          borderRadius: 16, padding: 18, zIndex: 100,
          boxShadow: '0 20px 40px rgba(0,0,0,0.5)',
          fontFamily: HIFI.fonts.mono, color: HIFI.ink,
        }}>
          <div style={{
            fontSize: 13, fontWeight: 700, letterSpacing: 1.6, marginBottom: 14,
          }}>TWEAKS</div>

          {/* Accent */}
          <div style={{ fontSize: 9, letterSpacing: 1.4, color: HIFI.ink3, marginBottom: 6 }}>ACCENT</div>
          <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
            {Object.entries(HIFI.accents).map(([k, c]) => (
              <button key={k} onClick={() => { setAccent(k); persist('accent', k); }}
                style={{
                  width: 34, height: 34, borderRadius: 8,
                  background: c.rec, cursor: 'pointer',
                  border: accent === k ? `2px solid ${HIFI.ink}` : `1px solid ${HIFI.stroke}`,
                  boxShadow: accent === k ? `0 0 12px ${c.recGlow}` : 'none',
                }} title={k} />
            ))}
          </div>

          {/* Font */}
          <div style={{ fontSize: 9, letterSpacing: 1.4, color: HIFI.ink3, marginBottom: 6 }}>BODY TYPE</div>
          <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
            {['mono', 'sans'].map(f => (
              <button key={f} onClick={() => { setFontMode(f); persist('font', f); }}
                style={{
                  flex: 1, padding: '8px 10px', borderRadius: 8,
                  background: fontMode === f ? HIFI.ink : 'transparent',
                  color: fontMode === f ? '#000' : HIFI.ink2,
                  border: `1px solid ${fontMode === f ? HIFI.ink : HIFI.stroke}`,
                  fontFamily: f === 'mono' ? HIFI.fonts.mono : HIFI.fonts.sans,
                  fontSize: 11, fontWeight: 600, cursor: 'pointer',
                  letterSpacing: 0.5, textTransform: 'uppercase',
                }}>{f === 'mono' ? 'Plex Mono' : 'Plex Sans'}</button>
            ))}
          </div>

          {/* Error kind picker — only relevant on error screen, shown always */}
          {screen === 'error' && (<>
            <div style={{ fontSize: 9, letterSpacing: 1.4, color: HIFI.ink3, marginBottom: 6 }}>ERROR</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4, marginBottom: 14 }}>
              {[
                { id: 'mic_denied',  label: 'Mic blocked' },
                { id: 'offline',     label: 'No connection' },
                { id: 'stt_failed',  label: 'Transcription failed' },
                { id: 'tts_failed',  label: 'Audio playback failed' },
                { id: 'bad_session', label: 'Bad handoff link' },
              ].map(e => (
                <button key={e.id} onClick={() => { setErrorKind(e.id); persist('errorKind', e.id); }}
                  style={{
                    padding: '6px 10px', borderRadius: 6, textAlign: 'left',
                    background: errorKind === e.id ? HIFI.ink : 'transparent',
                    color: errorKind === e.id ? '#000' : HIFI.ink2,
                    border: `1px solid ${errorKind === e.id ? HIFI.ink : HIFI.stroke}`,
                    fontFamily: HIFI.fonts.mono, fontSize: 11, fontWeight: 500,
                    cursor: 'pointer',
                  }}>{e.label}</button>
              ))}
            </div>
          </>)}

          <div style={{ marginTop: 4, paddingTop: 12, borderTop: `1px solid ${HIFI.stroke}`,
            fontSize: 9, color: HIFI.ink4, letterSpacing: 1, lineHeight: 1.5, fontFamily: HIFI.fonts.sans,
          }}>
            Tip: tap the big button in the phone to drive the real state machine.
            AI replies use browser TTS (unmute your tab).
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
